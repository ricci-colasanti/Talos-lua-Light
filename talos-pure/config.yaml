# ============================================
# Talos-Pure Configuration
# All models and statistics are in Lua!
# ============================================

# Simulation-level configuration
simulation:
  iterations: 10
  population_file: "population.csv"
  output_file: "output.csv"
  random_seed: 42
  verbose: true
  id_column: "person_id"     # REQUIRED

# ============================================
# Statistics - All in Lua
# ============================================

statistics:
  # Total population
  - name: "population_total"
    description: "Total population"
    script: |
      function statistic(population)
        return { total = #population }
      end

  # Alive and dead counts
  - name: "population_status"
    description: "Alive and dead counts"
    script: |
      function statistic(population)
        local alive = 0
        local dead = 0
        for _, person in ipairs(population) do
          if person.alive == true then
            alive = alive + 1
          else
            dead = dead + 1
          end
        end
        return { alive = alive, dead = dead }
      end

  # Age distribution
  - name: "age_distribution"
    description: "Age groups (alive only)"
    script: |
      function statistic(population)
        local children = 0
        local adults = 0
        local elderly = 0
        local super_elderly = 0

        for _, person in ipairs(population) do
          if person.alive == true then
            local age = person.age
            if age < 18 then
              children = children + 1
            elseif age >= 18 and age < 65 then
              adults = adults + 1
            elseif age >= 65 and age < 85 then
              elderly = elderly + 1
            else
              super_elderly = super_elderly + 1
            end
          end
        end

        return {
          children_0_17 = children,
          adults_18_64 = adults,
          elderly_65_84 = elderly,
          super_elderly_85_plus = super_elderly
        }
      end

  # Area distribution
  - name: "area_distribution"
    description: "Population by area"
    script: |
      function statistic(population)
        local areas = {}
        for _, person in ipairs(population) do
          local area = tostring(person.area)
          if areas[area] == nil then
            areas[area] = { total = 0, alive = 0 }
          end
          areas[area].total = areas[area].total + 1
          if person.alive == true then
            areas[area].alive = areas[area].alive + 1
          end
        end
        return areas
      end

  # Migration statistics
  - name: "migration_stats"
    description: "Migration statistics"
    script: |
      function statistic(population)
        local migrants = 0
        local total = 0

        for _, person in ipairs(population) do
          if person.alive == true then
            total = total + 1
            if person.previous_area ~= nil and person.previous_area ~= person.area then
              migrants = migrants + 1
            end
          end
        end

        local rate = 0
        if total > 0 then
          rate = (migrants / total) * 100
        end

        return {
          migrants = migrants,
          total = total,
          migration_rate_pct = rate
        }
      end

  # Average age by area
  - name: "avg_age_by_area"
    description: "Average age by area"
    script: |
      function statistic(population)
        local areas = {}
        for _, person in ipairs(population) do
          if person.alive == true then
            local area = tostring(person.area)
            if areas[area] == nil then
              areas[area] = { sum = 0, count = 0 }
            end
            areas[area].sum = areas[area].sum + person.age
            areas[area].count = areas[area].count + 1
          end
        end

        local result = {}
        for area, data in pairs(areas) do
          result[area] = {
            avg_age = data.sum / data.count,
            population = data.count
          }
        end
        return result
      end

# ============================================
# Models - All in Lua
# ============================================

models:
  # Model 1: Age increment
  - name: "age_increment"
    type: "lua_model"
    priority: 1
    enabled: true
    description: "Increment everyone's age by 1 year"
    parameters:
      script: |
        function transition(population, params)
          for _, person in ipairs(population) do
            if person.alive == true then
              person.age = person.age + 1
            end
          end
          return population
        end

  # Model 2: Mortality
  - name: "mortality"
    type: "lua_model"
    priority: 2
    enabled: true
    description: "Age-specific mortality model"
    parameters:
      mortality_rates:
        infant: 0.005
        child: 0.0005
        adult: 0.001
        elderly: 0.10
        super_elderly: 0.20
      script: |
        function transition(population, params)
          local rates = params.mortality_rates
          for _, person in ipairs(population) do
            if person.alive == true then
              local age = person.age
              local prob = 0
              if age < 1 then
                prob = rates.infant
              elseif age >= 1 and age < 5 then
                prob = rates.child
              elseif age >= 18 and age < 65 then
                prob = rates.adult
              elseif age >= 65 and age < 85 then
                prob = rates.elderly
              else
                prob = rates.super_elderly
              end
              if math.random() < prob then
                person.alive = false
              end
            end
          end
          return population
        end

  # Model 3: Migration
  - name: "migration"
    type: "lua_model"
    priority: 3
    enabled: true
    description: "Age-based migration between areas"
    parameters:
      migration_rates:
        child_0_17: 0.02
        adult_18_34: 0.08
        adult_35_64: 0.03
        elderly_65_plus: 0.01
      num_areas: 5
      script: |
        function transition(population, params)
          local rates = params.migration_rates
          local num_areas = params.num_areas

          for _, person in ipairs(population) do
            if person.alive == true then
              local age = person.age
              local prob = 0

              if age < 18 then
                prob = rates.child_0_17
              elseif age >= 18 and age < 35 then
                prob = rates.adult_18_34
              elseif age >= 35 and age < 65 then
                prob = rates.adult_35_64
              else
                prob = rates.elderly_65_plus
              end

              if math.random() < prob then
                person.previous_area = person.area
                person.area = math.random(1, num_areas)
              end
            end
          end
          return population
        end

  # Model 4: Fertility - This is where Lua really shines!
  - name: "fertility"
    type: "lua_model"
    priority: 4
    enabled: true
    description: "Fertility model with family linkages"
    parameters:
      fertility_rate: 0.05
      script: |
        function transition(population, params)
          local fertility_rate = params.fertility_rate
          local newborns = {}
          local mother_updates = {}

          -- Find max ID for new ID generation
          local max_id = 0
          for _, person in ipairs(population) do
            if person.person_id ~= nil then
              local id = tonumber(person.person_id)
              if id and id > max_id then
                max_id = id
              end
            end
          end

          -- Process each person
          for _, person in ipairs(population) do
            -- Skip dead people and men
            if person.alive == true and person.sex == "F" then
              -- Check if woman is of childbearing age
              if person.age >= 15 then
                -- Determine if she gives birth
                if math.random() < fertility_rate then
                  -- Create newborn
                  local child = {
                    person_id = max_id + 1,
                    age = 0,
                    sex = math.random(0, 1) == 0 and "F" or "M",
                    area = person.area,
                    alive = true,
                    previous_area = person.area,
                    mother_id = person.person_id,
                    father_id = person.partner_id or 0,
                    parity = (person.parity or 0) + 1
                  }
                  table.insert(newborns, child)
                  max_id = max_id + 1

                  -- Track that this mother needs parity update
                  mother_updates[person.person_id] = true
                end
              end
            end
          end

          -- Add newborns to population
          for _, child in ipairs(newborns) do
            table.insert(population, child)
          end

          -- Update mother parity
          for person_id in pairs(mother_updates) do
            for _, person in ipairs(population) do
              if person.person_id == person_id then
                person.parity = (person.parity or 0) + 1
                break
              end
            end
          end

          return population
        end
